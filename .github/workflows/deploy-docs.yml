name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "apps/docs/**"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

concurrency:
  group: deploy-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy docs
        run: npx --yes blodemd push apps/docs
        env:
          BLODEMD_API_KEY: ${{ secrets.BLODEMD_API_KEY }}
          BLODEMD_PROJECT: stratasync
